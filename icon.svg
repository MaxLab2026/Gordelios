<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Fondo -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1a2e"/>
      <stop offset="100%" stop-color="#0b1120"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e0bb5a"/>
      <stop offset="100%" stop-color="#c9a84c"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e3050"/>
      <stop offset="100%" stop-color="#152540"/>
    </linearGradient>
  </defs>

  <!-- Fondo redondeado -->
  <rect width="512" height="512" rx="92" ry="92" fill="url(#bg)"/>

  <!-- Borde dorado -->
  <rect x="20" y="20" width="472" height="472" rx="78" ry="78"
        fill="none" stroke="#c9a84c" stroke-width="11"/>

  <!-- Cuerpo de la factura -->
  <path d="M163,68 L349,68 Q364,68 364,83 L364,370 Q364,385 349,385 L163,385 Q148,385 148,370 L148,119 Z"
        fill="url(#paper)" stroke="rgba(201,168,76,0.6)" stroke-width="8"/>

  <!-- Doblez esquina sup-izq -->
  <path d="M148,119 L199,119 L199,68 Z" fill="#0f1e33" stroke="rgba(201,168,76,0.5)" stroke-width="7"/>

  <!-- Encabezado dorado -->
  <rect x="172" y="148" width="140" height="18" rx="9" fill="#c9a84c"/>

  <!-- Separador -->
  <rect x="172" y="180" width="192" height="5" rx="2.5" fill="rgba(201,168,76,0.35)"/>

  <!-- Fila 1 -->
  <rect x="172" y="196" width="112" height="14" rx="7" fill="rgba(255,255,255,0.2)"/>
  <rect x="304" y="196" width="60" height="14" rx="7" fill="rgba(201,168,76,0.35)"/>

  <!-- Fila 2 -->
  <rect x="172" y="220" width="96" height="14" rx="7" fill="rgba(255,255,255,0.2)"/>
  <rect x="304" y="220" width="60" height="14" rx="7" fill="rgba(201,168,76,0.35)"/>

  <!-- Fila 3 -->
  <rect x="172" y="244" width="106" height="14" rx="7" fill="rgba(255,255,255,0.2)"/>
  <rect x="304" y="244" width="60" height="14" rx="7" fill="rgba(201,168,76,0.35)"/>

  <!-- Separador total -->
  <rect x="172" y="270" width="192" height="5" rx="2.5" fill="rgba(201,168,76,0.45)"/>

  <!-- Barra total dorada -->
  <rect x="172" y="282" width="192" height="22" rx="11" fill="url(#gold)"/>

  <!-- Texto G's -->
  <text x="256" y="448"
        font-family="Georgia, serif"
        font-size="88"
        font-weight="900"
        font-style="italic"
        fill="url(#gold)"
        text-anchor="middle"
        dominant-baseline="middle">G's</text>
</svg>
